# ============================================================
# Supabase Keep-Alive Ping
# 7 ping al giorno ad orari distribuiti (ora italiana circa)
# ============================================================
name: Supabase Keep-Alive

on:
  schedule:
    - cron: '17 6  * * *'   # 08:17
    - cron: '43 8  * * *'   # 10:43
    - cron: '11 11 * * *'   # 13:11
    - cron: '37 13 * * *'   # 15:37
    - cron: '53 15 * * *'   # 17:53
    - cron: '29 17 * * *'   # 19:29
    - cron: '07 20 * * *'   # 22:07
  workflow_dispatch:          # esecuzione manuale dalla tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          echo "Pinging Supabase at $(date)..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/projects?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
            echo "Supabase is alive (status $STATUS)"
          else
            echo "Unexpected status: $STATUS"
            exit 1
          fi
